<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Space background radial gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1628"/>
      <stop offset="100%" stop-color="#05091a"/>
    </radialGradient>
    <!-- Planet gradient: deep blue-cyan -->
    <radialGradient id="planet" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="45%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </radialGradient>
    <!-- Ring gradient: cyan to purple -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.85"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Ring glow -->
    <filter id="ringGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="0.7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Circular background -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="5"  cy="6"  r="0.6" fill="#e2e8f0" opacity="0.8"/>
  <circle cx="27" cy="5"  r="0.5" fill="#e2e8f0" opacity="0.7"/>
  <circle cx="28" cy="24" r="0.6" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="4"  cy="25" r="0.4" fill="#e2e8f0" opacity="0.7"/>
  <circle cx="8"  cy="13" r="0.35" fill="#7dd3fc" opacity="0.6"/>
  <circle cx="26" cy="14" r="0.35" fill="#a78bfa" opacity="0.6"/>

  <!-- Ring back half (behind planet) -->
  <ellipse cx="16" cy="16.5" rx="12" ry="3.2"
    fill="none" stroke="url(#ring)" stroke-width="1.8"
    stroke-dasharray="37.7 37.7" stroke-dashoffset="18.85"
    opacity="0.55" filter="url(#ringGlow)"/>

  <!-- Planet -->
  <circle cx="16" cy="16" r="7.5" fill="url(#planet)" filter="url(#glow)"/>

  <!-- Planet surface detail: subtle latitude band -->
  <ellipse cx="16" cy="14.2" rx="7.4" ry="1.5"
    fill="none" stroke="#38bdf8" stroke-width="0.4" opacity="0.18"/>
  <ellipse cx="16" cy="17.6" rx="7.3" ry="1.4"
    fill="none" stroke="#7dd3fc" stroke-width="0.3" opacity="0.13"/>

  <!-- Specular highlight -->
  <ellipse cx="13.5" cy="13" rx="2.8" ry="1.6"
    fill="white" opacity="0.12"/>

  <!-- Ring front half (over planet) -->
  <ellipse cx="16" cy="16.5" rx="12" ry="3.2"
    fill="none" stroke="url(#ring)" stroke-width="1.8"
    stroke-dasharray="37.7 37.7" stroke-dashoffset="-18.85"
    opacity="0.92" filter="url(#ringGlow)"/>
</svg>
