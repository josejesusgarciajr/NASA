<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Space background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1628"/>
      <stop offset="100%" stop-color="#05091a"/>
    </radialGradient>
    <!-- Sun surface gradient -->
    <radialGradient id="sun" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="80%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <!-- Corona glow gradient -->
    <radialGradient id="corona" cx="50%" cy="50%" r="50%">
      <stop offset="60%"  stop-color="#f97316" stop-opacity="0"/>
      <stop offset="80%"  stop-color="#fbbf24" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fef9c3" stop-opacity="0"/>
    </radialGradient>
    <!-- Astrophage purple glow -->
    <radialGradient id="aphGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <!-- Filters -->
    <filter id="sunGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="aphFilter" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="0.9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    /* Pulsing corona */
    .corona {
      animation: pulse 2.4s ease-in-out infinite;
      transform-origin: 16px 16px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50%       { opacity: 1;    transform: scale(1.12); }
    }

    /* Sun surface shimmer */
    .sun-surface {
      animation: shimmer 3s ease-in-out infinite;
      transform-origin: 16px 16px;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.88; }
    }

    /* Astrophage orbit paths */
    .aph1 { animation: orbit1 3.2s linear infinite; transform-origin: 16px 16px; }
    .aph2 { animation: orbit2 4.8s linear infinite; transform-origin: 16px 16px; }
    .aph3 { animation: orbit3 2.6s linear infinite; transform-origin: 16px 16px; }
    .aph4 { animation: orbit4 5.5s linear infinite; transform-origin: 16px 16px; }

    @keyframes orbit1 {
      from { transform: rotate(0deg)   translateX(11px) rotate(0deg); }
      to   { transform: rotate(360deg) translateX(11px) rotate(-360deg); }
    }
    @keyframes orbit2 {
      from { transform: rotate(120deg)   translateX(9.5px) rotate(-120deg); }
      to   { transform: rotate(480deg)   translateX(9.5px) rotate(-480deg); }
    }
    @keyframes orbit3 {
      from { transform: rotate(240deg)   translateX(10.5px) rotate(-240deg); }
      to   { transform: rotate(600deg)   translateX(10.5px) rotate(-600deg); }
    }
    @keyframes orbit4 {
      from { transform: rotate(60deg)  translateX(8.5px) rotate(-60deg); }
      to   { transform: rotate(420deg) translateX(8.5px) rotate(-420deg); }
    }

    /* Astrophage fade in/out to simulate feeding burst */
    .aph-dot {
      animation: aphPulse 1.8s ease-in-out infinite;
    }
    @keyframes aphPulse {
      0%, 100% { opacity: 0.6; r: 1; }
      50%       { opacity: 1;   r: 1.4; }
    }
  </style>

  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="4"  cy="5"  r="0.5" fill="#e2e8f0" opacity="0.7"/>
  <circle cx="28" cy="4"  r="0.4" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="29" cy="26" r="0.5" fill="#e2e8f0" opacity="0.65"/>
  <circle cx="3"  cy="27" r="0.4" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="28" cy="15" r="0.35" fill="#a78bfa" opacity="0.5"/>
  <circle cx="4"  cy="17" r="0.3"  fill="#7dd3fc" opacity="0.5"/>

  <!-- Corona (pulsing outer glow) -->
  <circle class="corona" cx="16" cy="16" r="11" fill="url(#corona)"/>

  <!-- Sun surface -->
  <circle class="sun-surface" cx="16" cy="16" r="7.5"
    fill="url(#sun)" filter="url(#sunGlow)"/>

  <!-- Sun surface detail bands -->
  <ellipse cx="16" cy="14.5" rx="7.3" ry="1.1"
    fill="none" stroke="#fef9c3" stroke-width="0.35" opacity="0.12"/>
  <ellipse cx="16" cy="17.8" rx="7.2" ry="1"
    fill="none" stroke="#f97316" stroke-width="0.3" opacity="0.1"/>

  <!-- Specular highlight -->
  <ellipse cx="13.5" cy="13.2" rx="2.6" ry="1.5" fill="white" opacity="0.15"/>

  <!-- Astrophage particles (orbiting purple glowing dots) -->
  <g class="aph1" filter="url(#aphFilter)">
    <circle class="aph-dot" cx="16" cy="16" r="1.1" fill="#e879f9"/>
  </g>
  <g class="aph2" filter="url(#aphFilter)">
    <circle class="aph-dot" cx="16" cy="16" r="0.9" fill="#a78bfa"
      style="animation-delay: -0.9s"/>
  </g>
  <g class="aph3" filter="url(#aphFilter)">
    <circle class="aph-dot" cx="16" cy="16" r="1" fill="#c084fc"
      style="animation-delay: -0.4s"/>
  </g>
  <g class="aph4" filter="url(#aphFilter)">
    <circle class="aph-dot" cx="16" cy="16" r="0.8" fill="#e879f9"
      style="animation-delay: -1.3s"/>
  </g>

  <!-- Purple astrophage tint overlay on sun (feeding effect) -->
  <circle cx="16" cy="16" r="7.5" fill="#a78bfa" opacity="0.07"/>
</svg>
